# One free web service: the game server + the built client (same origin).
# Deploy: Render dashboard -> New + -> Blueprint -> select this repo -> Apply.
services:
  - type: web
    name: inkwars
    runtime: node
    plan: free
    healthCheckPath: /health
    # npm install (not ci): the lockfiles were generated on Windows and have a known
    # npm hole around platform-specific optional deps (@emnapi/*) that strict ci rejects
    buildCommand: npm install --include=dev --prefix client && npm install --include=dev --prefix server && npm run build --prefix client && npm run build --prefix server
    startCommand: node server/dist/server/src/index.js
    envVars:
      # prompts.ts resolves the manifest relative to the compiled file, which is wrong
      # under dist/ — point it at the built client copy instead (cwd-relative).
      - key: MODEL_MANIFEST_PATH
        value: client/dist/model/manifest.json
      - key: NODE_VERSION
        value: 22.16.0
      # playwright is a client devDep (e2e only); don't download browsers on Render
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
